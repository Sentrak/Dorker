name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: sentrak
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 52200
          script: |
            cd /var/www/dorker
            git pull origin main
            npm ci
            node ace build
            cd build && npm ci --omit=dev && cd ..
            cp /var/www/dorker/.env /var/www/dorker/build/.env
            pm2 restart dorker --update-env
