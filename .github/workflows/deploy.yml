name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          node ace build
          cd build && npm ci --omit=dev

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: sentrak
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 52200
          source: "build/"
          target: "/var/www/dorker/"

      - name: Restart app
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: sentrak
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 52200
          script: |
            cp /var/www/dorker/.env /var/www/dorker/build/.env
            pm2 restart dorker --update-env
